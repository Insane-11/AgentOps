services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agentops
      POSTGRES_PASSWORD: agentops
      POSTGRES_DB: agentops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentops"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://agentops:agentops@postgres:5432/agentops"
      DATABASE_URL_SYNC: "postgresql://agentops:agentops@postgres:5432/agentops"
      JWT_SECRET: "change-me-in-production"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_LLM_MODEL: "llama3.1:8b"
      OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:5174"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  admin-dashboard:
    build: ./admin-dashboard
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: "http://localhost:8000"
    depends_on:
      - backend

  engineer-dashboard:
    build: ./engineer-dashboard
    ports:
      - "5174:5173"
    environment:
      VITE_API_BASE: "http://localhost:8000"
    depends_on:
      - backend

  # ================================================================
  # LangFuse — Self-hosted observability (tracing, eval, dashboards)
